<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoClickerPAM</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <div class="logo-text">
          <h1>AutoClickerPAM</h1>
          <p>Tab Keeper</p>
        </div>
        <div class="status-badge" id="statusBadge">
          <div class="status-dot"></div>
          <span id="statusText">Inactive</span>
        </div>
      </div>

      <!-- Config Form (Active state hides configuration changes to prevent confusion) -->
      <div class="card form-group" id="configCard">
        <div class="form-row">
          <div class="form-field">
            <label for="modeSelect">Mode</label>
            <select id="modeSelect">
              <option value="alarm" selected>Alarm (60s+)</option>
              <option value="content_script">Content Script (5s+)</option>
            </select>
          </div>
          <div class="form-field">
            <label for="intervalInput">Interval (sec)</label>
            <input type="number" id="intervalInput" min="5" max="3600" value="60" />
          </div>
        </div>
        <div class="input-hint" id="inputHint">Alarm mode requires min 60 seconds.</div>
      </div>

      <!-- Target Tab Card -->
      <div class="card" id="tabCard" style="display: none;">
        <div class="card-title">Target Tab</div>
        <div class="tab-title" id="tabTitle">—</div>
      </div>

      <!-- Timer Card -->
      <div class="card timer-row" id="timerCard" style="display: none;">
        <span style="color: var(--text-secondary);">Active Duration</span>
        <div class="timer-value" id="timerValue">00:00:00</div>
      </div>

      <!-- Progress Bar -->
      <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>

      <!-- Error message -->
      <div class="error-msg" id="errorMsg"></div>

      <!-- Control Buttons -->
      <div class="btn-group">
        <button class="btn btn-start" id="btnStart">Start</button>
        <button class="btn btn-stop" id="btnStop" disabled>Stop</button>
      </div>

      <!-- Other Active Tabs -->
      <div class="card" id="sessionsCard" style="display: none; margin-top: 4px;">
        <div class="card-title" style="display: flex; justify-content: space-between; align-items: center;">
          <span>Other Active Tabs</span>
          <button id="btnStopAll" style="background: none; border: none; color: var(--accent-red); font-size: 10px; cursor: pointer; text-transform: uppercase; font-weight: 700; padding: 2px 4px;">Stop All</button>
        </div>
        <div id="sessionsList" style="display: flex; flex-direction: column; gap: 6px; margin-top: 6px;">
          <!-- Dynamically populated rows -->
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        Prioritizing reliability over aesthetics.
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
